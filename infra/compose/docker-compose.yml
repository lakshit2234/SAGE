name: sage

services:
  postgres:
    image: postgres:16-alpine
    container_name: sage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sage_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-sage}
    ports:
      - "5432:5432"
    volumes:
      - sage_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sage} -d ${POSTGRES_DB:-sage}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sage-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - sage_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: sage-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sage.dev
      PGADMIN_DEFAULT_PASSWORD: sage_admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - sage_pgadmin_data:/var/lib/pgadmin

volumes:
  sage_pg_data:
  sage_redis_data:
  sage_pgadmin_data: